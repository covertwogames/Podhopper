<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PodHopper - Reset Password</title>
<style>
  body { font-family: system-ui, sans-serif; background: #f4f2ee; color: #322d25;
         display: flex; justify-content: center; padding: 48px 16px; }
  .card { background: white; border-radius: 16px; padding: 32px; max-width: 400px;
          width: 100%; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  h1 { color: #269e5f; font-size: 1.4rem; }
  input { width: 100%; padding: 12px; margin: 8px 0 16px; border: 1px solid #ccc;
          border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
  button { width: 100%; padding: 12px; background: #269e5f; color: white; border: none;
           border-radius: 8px; font-size: 1rem; cursor: pointer; }
  button:disabled { background: #aaa; }
  .msg { margin-top: 16px; }
  .err { color: #b3261e; }
  .ok { color: #269e5f; }
</style>
</head>
<body>
<div class="card">
  <h1>Reset your PodHopper password</h1>
  <p>Enter a new password for your account.</p>
  <input type="password" id="pw1" placeholder="New password" minlength="6">
  <input type="password" id="pw2" placeholder="Confirm new password" minlength="6">
  <button id="btn" onclick="resetPassword()">Set new password</button>
  <div class="msg" id="msg"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://vamqoxkasykfhnlfeixz.supabase.co";
  const SUPABASE_KEY = "sb_publishable_mkv0y6AoTSkPoY6MekLj2g_ZOqpdKVv";
  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function resetPassword() {
    const msg = document.getElementById("msg");
    const pw1 = document.getElementById("pw1").value;
    const pw2 = document.getElementById("pw2").value;
    if (pw1.length < 6) { msg.className = "msg err"; msg.textContent = "Password must be at least 6 characters."; return; }
    if (pw1 !== pw2) { msg.className = "msg err"; msg.textContent = "Passwords do not match."; return; }
    document.getElementById("btn").disabled = true;
    const { error } = await client.auth.updateUser({ password: pw1 });
    if (error) {
      msg.className = "msg err";
      msg.textContent = "Could not reset password: " + error.message + ". Open this page from the link in your reset email.";
      document.getElementById("btn").disabled = false;
    } else {
      msg.className = "msg ok";
      msg.textContent = "Password updated! You can now log in inside the PodHopper app. Note: your paired car will need to be re-paired.";
    }
  }
</script>
</body>
</html>
